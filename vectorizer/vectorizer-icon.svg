<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#121212" stroke="#333" stroke-width="2"/>
  
  <!-- Raster image representation (left side - pixels) -->
  <g opacity="0.6">
    <rect x="40" y="70" width="12" height="12" fill="#666" rx="1"/>
    <rect x="40" y="85" width="12" height="12" fill="#666" rx="1"/>
    <rect x="40" y="100" width="12" height="12" fill="#666" rx="1"/>
    <rect x="40" y="115" width="12" height="12" fill="#666" rx="1"/>
    
    <rect x="55" y="70" width="12" height="12" fill="#888" rx="1"/>
    <rect x="55" y="85" width="12" height="12" fill="#888" rx="1"/>
    <rect x="55" y="100" width="12" height="12" fill="#888" rx="1"/>
    <rect x="55" y="115" width="12" height="12" fill="#888" rx="1"/>
  </g>
  
  <!-- Arrow (conversion symbol) -->
  <g fill="none" stroke="rgba(100, 150, 255, 0.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 80 100 L 110 100"/>
    <path d="M 105 95 L 110 100 L 105 105"/>
  </g>
  
  <!-- Vector path representation (right side - smooth curves) -->
  <g fill="none" stroke="rgba(100, 150, 255, 0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bezier curve representing vector -->
    <path d="M 125 70 Q 140 70 145 85 Q 150 100 145 115 Q 140 130 125 130"/>
    <path d="M 155 85 L 155 115"/>
  </g>
  
  <!-- Control points on vector (small dots) -->
  <circle cx="125" cy="70" r="2.5" fill="rgba(100, 150, 255, 0.9)"/>
  <circle cx="145" cy="85" r="2.5" fill="rgba(100, 150, 255, 0.9)"/>
  <circle cx="145" cy="115" r="2.5" fill="rgba(100, 150, 255, 0.9)"/>
  <circle cx="125" cy="130" r="2.5" fill="rgba(100, 150, 255, 0.9)"/>
  <circle cx="155" cy="85" r="2.5" fill="rgba(100, 150, 255, 0.9)"/>
  <circle cx="155" cy="115" r="2.5" fill="rgba(100, 150, 255, 0.9)"/>
</svg>
